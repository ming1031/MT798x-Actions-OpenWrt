name: Build OpenWrt JDCloud Baili (Stable)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: 24.10-6.6/AX6000.config
  DIY_P1_SH: 24.10-6.6/diy-part1.sh
  DIY_P2_SH: 24.10-6.6/diy-part2.sh
  OPENWRT_NAME: ImmortalWrt
  DEVICE_NAME: JDCloud-Baili
  IP_ADDR: 10.10.10.1
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 初始化环境
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get -qq update
        sudo apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/teddysun/build/master/openwrt/depends-ubuntu-2204)
        sudo apt-get -qq install rename golang-go
        sudo apt-get autoremove --purge -y
        sudo apt-get clean
        sudo timedatectl set-timezone "$TZ"
        echo "FILE_DATE=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

    - name: 克隆源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 加载 feeds（稳定版）
      run: |
        cd openwrt

        # ✅ 精简 feeds（避免 routing/telephony 坑）
        cat > feeds.conf.default <<EOF
        src-git packages https://github.com/immortalwrt/packages.git;openwrt-24.10
        src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10
        EOF

        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH

        ./scripts/feeds update -a

        # ✅ 防炸检测
        [ -d feeds/packages ] || exit 1
        [ -d feeds/luci ] || exit 1

        # 删除旧 argon
        rm -rf feeds/luci/themes/luci-theme-argon
        rm -rf feeds/luci/applications/luci-app-argon-config

        ./scripts/feeds install -a

    - name: 加载配置
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt

        # 修改默认 IP
        sed -i "s/192.168.1.1/$IP_ADDR/g" package/base-files/files/bin/config_generate

        $GITHUB_WORKSPACE/$DIY_P2_SH

        make defconfig

    - name: 下载包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: build
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理固件
      id: organize
      if: steps.build.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        rename 's/.*jdcloud_re-cp-03/${{ env.FILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.DEVICE_NAME }}/' *.bin
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: ${{ env.FILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.DEVICE_NAME }}
        path: ${{ env.FIRMWARE }}

    - name: 发布 Release
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: 京东云百里 24.10 固件 ${{ env.FILE_DATE }}
        tag_name: ${{ env.FILE_DATE }}
        body: |
          📦 硬件: 京东云百里 (RE-CP-03)
          🌐 默认IP: ${{ env.IP_ADDR }}
          🔑 默认密码: 无

          🧩 源码:
          - 主源码: ${{ env.REPO_URL }}
          - 分支: ${{ env.REPO_BRANCH }}
          - 配置文件: ${{ env.CONFIG_FILE }}
          - DIY1: ${{ env.DIY_P1_SH }}
          - DIY2: ${{ env.DIY_P2_SH }}

          🕒 编译时间: ${{ env.FILE_DATE }}
