name: Build OpenWrt JDCloud Baili

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: 24.10-6.6/AX6000.config
  FEEDS_CONF: 24.10-6.6/feeds.conf.default
  DIY_P1_SH: 24.10-6.6/diy-part1.sh
  DIY_P2_SH: 24.10-6.6/diy-part2.sh
  OPENWRT_NAME: ImmortalWrt
  DEVICE_NAME: JDCloud-Baili
  IP_ADDR: 10.10.10.1
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 初始化编译环境
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/teddysun/build/master/openwrt/depends-ubuntu-2204)
        # 确保安装了 rename 和 golang，Lucky 编译需要 go
        sudo -E apt-get -qq install rename golang-go
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        echo "FILE_DATE=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

    - name: 克隆源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt

    - name: 加载自定义 feeds
      run: |
        # 1. 如果有自定义 feeds，先复制过去
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
        
        # 2. 【核心修复】强制转换换行符，防止 Windows 回车符导致 update 失败
        sed -i 's/\r$//' openwrt/feeds.conf.default
        
        # 3. 执行 DIY Part 1
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
        # 4. 更新源（这是最关键的一步，必须成功）
        ./scripts/feeds update -a
        
        # 5. 【清理冲突】删除官方源里的旧版 Argon，确保使用后面 DIY2 里 clone 的新版
        rm -rf feeds/luci/themes/luci-theme-argon
        rm -rf feeds/luci/applications/luci-app-argon-config
        
        # 6. 安装源
        ./scripts/feeds install -a

        
        # 5. 安装 feeds
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        
        # 执行 DIY Part 2 (这里面我们会写 git clone 逻辑)
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 修正：将默认的 192.168.1.1 替换为你的 10.10.10.1
        sed -i "s/192.168.1.1/$IP_ADDR/g" package/base-files/files/bin/config_generate
        
        make defconfig

    - name: 下载软件包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理文件并重命名
      id: organize
      if: steps.build.outputs.status == 'success'
      run: | 
        cd openwrt/bin/targets/*/*
        rm -rf packages
        # 匹配百里固件名称
        rename 's/.*jdcloud_re-cp-03/${{ env.FILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.DEVICE_NAME }}/' *.bin
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件至 Artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: ${{ env.FILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.DEVICE_NAME }}
        path: ${{ env.FIRMWARE }}

    - name: 生成 Release 标签
      id: tag
      if: steps.organize.outputs.status == 'success'
      run: |
        echo "release_tag=${{ env.FILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.DEVICE_NAME }}" >> $GITHUB_OUTPUT
        touch release.txt
        echo "📦 京东云百里 (RE-CP-03) 专属固件 | eMMC 版" >> release.txt
        echo "🕒 编译时间: $(date +"%Y年%m月%d日 %H:%M")" >> release.txt
        echo "🌐 默认后台: $IP_ADDR" >> release.txt
        echo "🔗 源码: $REPO_URL ($REPO_BRANCH)" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布固件至 Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: 京东云百里 编译固件 ${{ env.FILE_DATE }}
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
