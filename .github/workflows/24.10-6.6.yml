name: Build OpenWrt JDCloud Baili

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: 24.10-6.6/AX6000.config
  DIY_P1_SH: 24.10-6.6/diy-part1.sh
  DIY_P2_SH: 24.10-6.6/diy-part2.sh
  IP_ADDR: 10.10.10.1
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 初始化编译环境
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/teddysun/build/master/openwrt/depends-ubuntu-2204)
        sudo -E apt-get -qq install rename golang-go
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 强制生成 Feeds 配置
      run: |
        cd openwrt
        # 直接物理删除旧文件，强行写入，不读仓库里的 feeds.conf.default
        rm -f feeds.conf.default
        echo 'src-git packages https://github.com/immortalwrt/packages.git;openwrt-24.10' > feeds.conf.default
        echo 'src-git luci https://github.com/immortalwrt/luci.git;openwrt-24.10' >> feeds.conf.default
        echo 'src-git routing https://github.com/immortalwrt/routing.git;openwrt-24.10' >> feeds.conf.default
        echo 'src-git telephony https://github.com/immortalwrt/telephony.git;openwrt-24.10' >> feeds.conf.default
        
        # 打印出来检查一下，防止 echo 出错
        cat feeds.conf.default
        
        # 执行 DIY1
        chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
        # 更新并安装，加上详细日志显示
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置与插件
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        cd openwrt
        
        # 修正后台 IP: 将默认的 192.168.1.1 改为 10.10.10.1
        sed -i "s/192.168.1.1/$IP_ADDR/g" package/base-files/files/bin/config_generate
        
        # 执行 DIY2 (直接克隆 Argon 和 Lucky)
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 强制更新配置
        make defconfig

    - name: 下载软件包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-Baili-Firmware
        path: openwrt/bin/targets/mediatek/mt7986/*.bin
